name: Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-ci:
    name: Nightly sanity (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.26', 'stable']
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go.sum

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
        shell: bash

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -v

  nightly-lint:
    name: Nightly golangci-lint
    runs-on: ubuntu-latest
    # golangci-lint v2.1.x is built with Go 1.24 and panics ("package
    # requires newer Go version go1.26") when linting a module with
    # `go 1.26` in go.mod. Marked continue-on-error to match the
    # mitigation already in place in ci.yml until a golangci-lint
    # release with Go 1.26 support ships.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.6

  nightly-audit:
    name: Nightly govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
