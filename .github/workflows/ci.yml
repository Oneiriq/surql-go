name: CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main
      - 'release/**'

jobs:
  quality:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -v

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start SurrealDB
        run: |
          docker run -d \
            --name surrealdb \
            -p 8000:8000 \
            surrealdb/surrealdb:v3.0.5 \
            start --user root --pass root memory
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then
              echo "SurrealDB ready"
              break
            fi
            echo "Waiting for SurrealDB... attempt $i"
            sleep 2
          done

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      # Race detector is disabled on the integration job because surrealdb.go
      # v1.4.0 has a known race in CloseLiveNotifications (Kill closes a
      # channel while handleResponse still writes to it). The unit-test job
      # still runs with -race to catch bugs in our own code.
      - name: Integration tests
        run: go test -tags=integration ./... -v
        env:
          SURREAL_URL: ws://localhost:8000
          SURREAL_USER: root
          SURREAL_PASS: root

      - name: Stop SurrealDB
        if: always()
        run: docker stop surrealdb || true
