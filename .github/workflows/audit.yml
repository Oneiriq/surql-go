name: Security Audit

on:
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - '**/go.mod'
      - '**/go.sum'
      - '.github/workflows/audit.yml'
  push:
    branches:
      - main
    paths:
      - '**/go.mod'
      - '**/go.sum'
      - '.github/workflows/audit.yml'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
