version: "2"
run:
  # golangci-lint v2.1.x is still built with Go 1.24 and refuses code
  # targeting Go 1.26. Lint against 1.24 semantics -- our code stays
  # within that level.
  go: "1.24"
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gosec:
      excludes:
        - G104
        # Integer conversions in numeric coercion helpers are deliberate
        # (SurrealDB returns untyped numerics that we normalise to int64).
        - G115
    revive:
      rules:
        - name: exported
        - name: package-comments
        - name: var-naming
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      # Established public API names (e.g. QueryResult[T], SchemaRegistry,
      # MigrationState) intentionally repeat their package name. Renaming
      # them would be a breaking change for downstream consumers.
      - linters:
          - revive
        text: "^exported: (type|func) name will be used as"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Oneiriq/surql-go
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
